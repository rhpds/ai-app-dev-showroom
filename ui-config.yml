---
type: showroom

# Set the left column width to 30%
default_width: 30
# Persist the URL state so browser refresh doesn't reset the UI
persist_url_state: true

view_switcher:
  enabled: true
  default_mode: split

tabs:
  # Lab terminal — no auth needed
  - name: Terminal
    path: /terminal
    port: 443

  # OCP Console — student logs in here first via Keycloak SSO
  # This establishes the session cookie needed for the VNC tab
  - name: OCP Console
    url: 'https://console-openshift-console.${DOMAIN}'
