---
type: showroom

# Set the left column width to 30%
default_width: 30
# Persist the URL state so browser refresh doesn't reset the UI
persist_url_state: true

view_switcher:
  enabled: true
  default_mode: split

tabs:
  # Lab terminal
  - name: Terminal
    path: /terminal
    port: 443

  # Podman Desktop — VNC via OCP Console standalone VM console
  # Namespace and VM name are injected by AgV ocp4_workload_showroom_content_ui_config
  - name: Podman Desktop
    url: '${VNC_URL}'

  # OCP Console
  - name: OCP Console
    url: 'https://console-openshift-console.${DOMAIN}'
